<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vines</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    #status {
      position: fixed;
      top: 16px; left: 16px;
      font-size: 9px;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      z-index: 10;
      pointer-events: none;
      line-height: 2;
    }

    /* ── panel ── */
    #ui {
      position: fixed;
      top: 50%; right: 20px;
      transform: translateY(-50%);
      width: 210px;
      background: rgba(0,0,0,0.54);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 4px;
      z-index: 10;
      overflow: hidden;
    }

    #ui-inner { padding: 8px 0 8px; }

    /* accordion section */
    .acc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 13px;
      cursor: pointer;
      user-select: none;
    }
    .acc-header:hover .acc-label { color: rgba(255,255,255,0.45); }

    .acc-label {
      font-size: 8px;
      color: rgba(255,255,255,0.22);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: color 0.12s;
    }

    .acc-chevron {
      font-size: 8px;
      color: rgba(255,255,255,0.18);
      line-height: 1;
      transition: transform 0.18s;
    }
    .acc-header.open .acc-chevron { transform: rotate(180deg); }

    .acc-body {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.22s ease, padding 0.22s ease;
      padding: 0 13px;
    }
    .acc-body.open {
      max-height: 300px;
      padding: 0 13px 8px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
    }
    .row:last-child { margin-bottom: 0; }

    .row label {
      font-size: 9px;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.10em;
      text-transform: uppercase;
      width: 62px;
      flex-shrink: 0;
    }

    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 2px;
      background: rgba(255,255,255,0.12);
      border-radius: 1px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 9px; height: 9px;
      border-radius: 50%;
      background: rgba(255,255,255,0.50);
      cursor: pointer;
      transition: background 0.12s;
    }
    input[type="range"]:hover::-webkit-slider-thumb { background: rgba(255,255,255,0.9); }

    input[type="color"] {
      -webkit-appearance: none;
      width: 28px; height: 16px;
      border: none; background: none;
      cursor: pointer; padding: 0;
      border-radius: 2px; overflow: hidden;
    }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: none; border-radius: 2px; }

    select {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255,255,255,0.06);
      border: none;
      color: rgba(255,255,255,0.45);
      font-size: 9px;
      letter-spacing: 0.06em;
      padding: 3px 6px;
      border-radius: 2px;
      cursor: pointer;
      font-family: inherit;
      outline: none;
    }
    select option { background: #111; color: rgba(255,255,255,0.7); }

    .acc-divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 0;
    }

    .btn {
      display: block; width: 100%;
      background: rgba(255,255,255,0.05);
      border: none; color: rgba(255,255,255,0.35);
      font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 6px 8px; cursor: pointer; text-align: left;
      margin-bottom: 4px; border-radius: 2px;
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
    }
    .btn:last-child { margin-bottom: 0; }
    .btn:hover { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.75); }
    .btn.active { background: rgba(255,60,60,0.14); color: rgba(255,100,100,0.9); }

    /* bottom action row */
    #ui-actions {
      display: flex;
      gap: 6px;
      padding: 6px 13px 8px;
    }
    #ui-actions .btn { margin: 0; flex: 1; text-align: center; }

    #hint {
      position: fixed;
      bottom: 18px; left: 18px;
      z-index: 10;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .hint-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hint-group svg {
      opacity: 0.22;
      flex-shrink: 0;
    }

    .hint-label {
      font-size: 8px;
      color: rgba(255,255,255,0.22);
      letter-spacing: 0.13em;
      text-transform: uppercase;
      line-height: 1;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div id="status">
  <div id="s-len">trail · 0</div>
  <div id="s-dir">dir · 0° · 0°</div>

</div>

<div id="ui">

    <div class="acc-divider"></div>

    <!-- Colour -->

      <span class="acc-label">Colour</span><span class="acc-chevron">▾</span>

    <div class="acc-body" id="acc-colour">

      <div class="row"><label>Thorn Width</label><input type="range" id="slThornWidth" min="0.002" max="0.06" step="0.001" value="0.018"></div>

    <div class="acc-divider"></div>

    <!-- Image -->
    <div class="acc-header" data-acc="image">
      <span class="acc-label">Image</span><span class="acc-chevron">▾</span>
    </div>
    <div class="acc-body" id="acc-image">

      <div class="row"><label>Threshold</label><input type="range" id="slThreshold" min="0.0" max="0.5" step="0.005" value="0.0"></div>
      <div class="row"><label>Grain</label><input type="range" id="slGrain" min="0" max="1" step="0.01" value="0"></div>
      <div class="row"><label>Export</label>
        <select id="selExport">
          <option value="screen">Screen</option>
          <option value="1080x1920">1080 × 1920</option>
          <option value="1920x1080">1920 × 1080</option>
          <option value="1080x1080">1080 × 1080</option>
          <option value="2160x3840">2160 × 3840 4K</option>
          <option value="3840x2160">3840 × 2160 4K</option>
        </select>
      </div>
    </div>

    <div class="acc-divider"></div>

    <!-- Material -->
    <div class="acc-header" data-acc="material">
      <span class="acc-label">Material</span><span class="acc-chevron">▾</span>
    </div>
    <div class="acc-body" id="acc-material">
      <div class="row" style="gap:4px">
        <button class="btn mat-btn" id="btnMatte"  style="flex:1;margin:0;text-align:center">Matte</button>
        <button class="btn mat-btn" id="btnGlossy" style="flex:1;margin:0;text-align:center">Glossy</button>
        <button class="btn mat-btn" id="btnChrome" style="flex:1;margin:0;text-align:center">Chrome</button>
      </div>
    </div>

    <div class="acc-divider"></div>

    <!-- Presets -->
    <div class="acc-header" data-acc="presets">
      <span class="acc-label">Presets</span><span class="acc-chevron">▾</span>
    </div>
    <div class="acc-body" id="acc-presets">
      <div class="row">
        <input type="text" id="presetName" placeholder="name…"

                 font-size:9px;letter-spacing:0.06em;padding:3px 6px;border-radius:2px;
                 outline:none;font-family:inherit;">
        <button class="btn" id="btnSavePreset" style="flex-shrink:0;margin:0 0 0 5px;padding:5px 8px">Save</button>
      </div>
      <div class="row">

      </div>

    <!-- Actions -->

    </div>

  "imports": {

<script type="module">
import * as THREE from 'three';

// ─────────────────────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────────────────────
const SEGMENT_LEN  = 0.35;
const MAX_POINTS   = 200;
const STEER_RATE   = 0.022;
const CAM_BACK     = 1.0;
const CAM_UP       = 5.0;
const LOOK_AHEAD   = 1.5;
const CAM_LERP     = 0.055;
const CAM_LERP_DRIVE = 0.10;   // smooth lock-on while keys held
const HELIX_RADIUS = 0.32;
const HELIX_FREQ   = 1.5;
const NUM_STRANDS  = 3;
const Y_AXIS = new THREE.Vector3(0, 1, 0);

// ─────────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────────
const S = {
  vineColor:      0xffffff,
  thornColor:     0xffffff,
  bgColor:        0x000000,
  lightIntensity: 2.5,
  lightAzimuth:   45,
  lightElevation: 55,
  lightColor:     0xffffff,
  growthSpeed:    0.05,
  // vine geometry
  vineThickness:  0.060,   // tube radius
  // thorn geometry (all rebuild-on-change)
  thornDensity:   0.048,   // ring spacing fraction
  thornSize:      0.20,    // length multiplier
  thornWidth:     0.018,   // cone base radius
  // shadow
  shadowIntensity: 1.0,
  shadowColor:     0x000000,
  // image
  exposure:       1.0,
  threshold:      0.0,
  grainAmount:    0.0,
};

// ─────────────────────────────────────────────────────────
//  RENDERER
// ─────────────────────────────────────────────────────────
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({
  canvas,
  antialias:             true,
  preserveDrawingBuffer: true,
  powerPreference:       'high-performance',
});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(S.bgColor, 1);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;

// ─────────────────────────────────────────────────────────
//  RENDER TARGET
// ─────────────────────────────────────────────────────────
const renderTarget = new THREE.WebGLRenderTarget(
  window.innerWidth, window.innerHeight,
  { minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter,
    format: THREE.RGBAFormat, type: THREE.UnsignedByteType,
    depthBuffer: true, stencilBuffer: false }
);

// ─────────────────────────────────────────────────────────
//  COMPOSITE PASS  — grain masked to lit areas + exposure
// ─────────────────────────────────────────────────────────
const compositeScene  = new THREE.Scene();
const compositeCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

const compositeMat = new THREE.ShaderMaterial({
  uniforms: {
    tScene:       { value: renderTarget.texture },
    uTime:        { value: 0.0 },
    uAmount:      { value: 0.0 },
    uExposure:    { value: 1.0 },
    uThreshold:   { value: 0.0 },
    uBgColor:     { value: new THREE.Vector3(0, 0, 0) },
    uShadowColor: { value: new THREE.Vector3(0, 0, 0) },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }
  `,
  fragmentShader: `
    varying vec2 vUv;
    uniform sampler2D tScene;
    uniform float     uTime;
    uniform float     uAmount;
    uniform float     uExposure;
    uniform float     uThreshold;
    uniform vec3      uBgColor;
    uniform vec3      uShadowColor;

    float hash(vec2 p) {
      return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
    }

    void main() {
      vec4  raw     = texture2D(tScene, vUv);

      // Exposure
      vec3  exposed = clamp(raw.rgb * uExposure, 0.0, 1.0);

      // Object mask — pixels that differ from bg are geometry
      float dist    = length(raw.rgb - uBgColor);
      float objMask = smoothstep(0.012, 0.07, dist);

      // Shadow color — replaces black/dark areas on geometry only
      float lum       = dot(exposed, vec3(0.299, 0.587, 0.114));
      float shadowMix = (1.0 - smoothstep(0.0, 0.45, lum)) * objMask;
      exposed = mix(exposed, uShadowColor, shadowMix);

      // Threshold — luminance below cutoff falls to pure black (Photoshop-style)
      float lum2  = dot(exposed, vec3(0.299, 0.587, 0.114));
      float tMask = smoothstep(uThreshold - 0.02, uThreshold + 0.02, lum2);
      exposed *= tMask;

      // Grain mask: only where pixel differs from background
      float gMask = objMask;

      float n     = hash(vUv * 920.0 + fract(uTime * 0.07) * 580.0);
      float grain = (n - 0.5) * 2.0 * uAmount * gMask;

      gl_FragColor = vec4(clamp(exposed + grain, 0.0, 1.0), 1.0);
    }
  `,
  depthTest: false, depthWrite: false,
});

const compositeQuad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), compositeMat);
compositeQuad.frustumCulled = false;
compositeScene.add(compositeQuad);

// ─────────────────────────────────────────────────────────
//  MAIN SCENE & CAMERA
// ─────────────────────────────────────────────────────────
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.01, 2000);
camera.position.set(0, 0.9, 3.2);
camera.lookAt(0, 0, -3);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderTarget.setSize(window.innerWidth, window.innerHeight);
});

// ─────────────────────────────────────────────────────────
//  MATERIALS
// ─────────────────────────────────────────────────────────
const vineMat  = new THREE.MeshStandardMaterial({ color: S.vineColor,  metalness: 0.10, roughness: 0.72 });
const thornMat = new THREE.MeshStandardMaterial({ color: S.thornColor, metalness: 0.15, roughness: 0.60 });

// ─────────────────────────────────────────────────────────
//  LIGHTING
// ─────────────────────────────────────────────────────────
const dirLight  = new THREE.DirectionalLight(0xffffff, S.lightIntensity);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
scene.add(dirLight);

const fillLight = new THREE.PointLight(0xffffff, 0.04, 80);
fillLight.position.set(-5, 8, -5);
scene.add(fillLight);

// Shadow fill — ambient raised/lowered by shadow intensity slider
const shadowFill = new THREE.AmbientLight(0xffffff, 0.0);
scene.add(shadowFill);


function updateLight() {
  const az = S.lightAzimuth   * Math.PI / 180;
  const el = S.lightElevation * Math.PI / 180;
  dirLight.position.set(
    Math.cos(el) * Math.sin(az),
    Math.sin(el),
    Math.cos(el) * Math.cos(az)
  ).multiplyScalar(10);
  dirLight.intensity = S.lightIntensity;
  // Use setRGB from raw channels to bypass ColorManagement sRGB conversion
  const lc = S.lightColor;
  dirLight.color.setRGB(((lc>>16)&0xff)/255, ((lc>>8)&0xff)/255, (lc&0xff)/255);
}
updateLight();

// ─────────────────────────────────────────────────────────
//  DETERMINISTIC RNG — stable thorn placement across rebuilds
// ─────────────────────────────────────────────────────────
function rng(seed) {
  let s = ((seed ^ (seed >>> 17)) * 2246822519) >>> 0;
  s     = ((s ^ (s >>> 13)) * 3266489917) >>> 0;
  return ((s ^ (s >>> 16)) >>> 0) / 4294967296;
}

// ─────────────────────────────────────────────────────────
//  VINE ENGINE
// ─────────────────────────────────────────────────────────
let spinePoints = [];
let tipPos      = new THREE.Vector3(0, 0, 0);
let tipDir      = new THREE.Vector3(0, 0.08, -1).normalize();
let distAccum   = 0;

const strandMeshes = Array(NUM_STRANDS).fill(null);
const thornGroups  = Array.from({ length: NUM_STRANDS }, () => {
  const g = new THREE.Group(); scene.add(g); return g;
});

function rebuildBraid() {
  if (spinePoints.length < 4) return;

  const pts        = [...spinePoints, tipPos.clone()];
  const spineCurve = new THREE.CatmullRomCurve3(pts, false, 'centripetal', 0.5);
  const N          = Math.max(40, pts.length * 3);
  const spineFrames = spineCurve.computeFrenetFrames(N, false);
  const arcLens    = spineCurve.getLengths(N);

  for (let si = 0; si < NUM_STRANDS; si++) {

    // ── helical strand path ──
    const strandPts = [];
    for (let j = 0; j <= N; j++) {
      const t  = j / N;
      const s  = arcLens[j] ?? arcLens[arcLens.length - 1];
      const pos = spineCurve.getPoint(t);
      const n  = spineFrames.normals[j];
      const bn = spineFrames.binormals[j];
      if (!n || !bn || n.lengthSq() < 0.001) { strandPts.push(pos.clone()); continue; }
      const angle = (si / NUM_STRANDS) * Math.PI * 2 + s * HELIX_FREQ;
      strandPts.push(pos.clone()
        .addScaledVector(n,  Math.cos(angle) * HELIX_RADIUS)
        .addScaledVector(bn, Math.sin(angle) * HELIX_RADIUS));
    }

    const strandCurve = new THREE.CatmullRomCurve3(strandPts, false, 'centripetal', 0.5);
    const tubeSeg     = N;

    // ── stem tube ──
    if (strandMeshes[si]) { strandMeshes[si].geometry.dispose(); scene.remove(strandMeshes[si]); }
    strandMeshes[si] = new THREE.Mesh(
      new THREE.TubeGeometry(strandCurve, tubeSeg, S.vineThickness, 7, false), vineMat);
    strandMeshes[si].castShadow = true;
    scene.add(strandMeshes[si]);

    // ── crown-of-thorns ──
    thornGroups[si].traverse(o => { if (o.isMesh) o.geometry.dispose(); });
    thornGroups[si].clear();

    const strandFrames = strandCurve.computeFrenetFrames(tubeSeg, false);
    const thornStep    = Math.max(2, Math.floor(tubeSeg * S.thornDensity));

    for (let i = thornStep; i < tubeSeg - thornStep; i += thornStep) {
      const tn  = strandFrames.normals[i];
      const tbn = strandFrames.binormals[i];
      const ttg = strandFrames.tangents[i];
      if (!tn || !tbn || !ttg || tn.lengthSq() < 0.001) continue;

      const pos = strandCurve.getPoint(i / tubeSeg);

      for (let k = 0; k < 3; k++) {
        const rotBase = rng(i * 37 + si * 71 + 1) * Math.PI;
        const phi     = (k / 3) * Math.PI * 2 + rotBase;

        let dir = tn.clone().multiplyScalar(Math.cos(phi))
          .addScaledVector(tbn, Math.sin(phi));
        dir.addScaledVector(ttg.clone().negate(), 0.38).normalize();

        const tLen = S.thornSize * (4.5 + rng(i * 37 + si * 71 + k + 2) * 3.0)
                                 * (0.55 + rng(i * 41 + si * 67 + k * 13 + 7) * 0.9);
        const tRad = S.thornWidth * (0.45 + rng(i * 53 + si * 79 + k * 17 + 11) * 1.1);

        const mesh = new THREE.Mesh(new THREE.ConeGeometry(tRad, tLen, 4, 1), thornMat);
        mesh.castShadow = true;
        mesh.quaternion.setFromUnitVectors(Y_AXIS, dir);
        mesh.position.copy(pos).addScaledVector(dir, S.vineThickness + tLen * 0.40);
        thornGroups[si].add(mesh);
      }
    }
  }
}

function confirmPoint(pt) {
  spinePoints.push(pt.clone());
  if (spinePoints.length > MAX_POINTS) spinePoints.shift();
  rebuildBraid();
}

function clearMeshes() {
  strandMeshes.forEach((m, i) => {
    if (m) { m.geometry.dispose(); scene.remove(m); strandMeshes[i] = null; }
  });
  thornGroups.forEach(g => { g.traverse(o => { if (o.isMesh) o.geometry.dispose(); }); g.clear(); });
}

function resetAll() {
  clearMeshes();
  spinePoints = [];
  distAccum   = 0;
  tipPos.set(0, 0, 0);
  tipDir.set(0, 0.08, -1).normalize();
  _autoPos.set(0, 0.9, 3.2);
  _autoLook.set(0, 0, -3);
  manualCamera = false;
  syncOrbitFromCamera();
  for (let i = 0; i < 8; i++) { tipPos.addScaledVector(tipDir, SEGMENT_LEN); spinePoints.push(tipPos.clone()); }
  rebuildBraid();
}

// ─────────────────────────────────────────────────────────
//  CAMERA — auto-follow + manual orbit/pan/zoom
// ─────────────────────────────────────────────────────────

// Auto-follow state (smooth lerp targets)
const _autoPos  = new THREE.Vector3(0, 0.9, 3.2);
const _autoLook = new THREE.Vector3(0, 0, -3);

// Orbit state (manual control)
const orbitTarget = new THREE.Vector3(0, 0, -3);
let   orbitRadius = 6.3;
let   orbitTheta  = 0;           // horizontal angle
let   orbitPhi    = 1.43;        // vertical angle (π/2 = equator)
let   manualCamera = false;

function applyOrbit() {
  const sp = Math.sin(orbitPhi),  cp = Math.cos(orbitPhi);
  const st = Math.sin(orbitTheta), ct = Math.cos(orbitTheta);
  camera.position.set(
    orbitTarget.x + orbitRadius * sp * st,
    orbitTarget.y + orbitRadius * cp,
    orbitTarget.z + orbitRadius * sp * ct
  );
  camera.lookAt(orbitTarget);
  // Keep auto-follow targets in sync so resume is seamless
  _autoPos.copy(camera.position);
  _autoLook.copy(orbitTarget);
}

function syncOrbitFromCamera() {
  // Initialise orbit params from current camera state
  orbitTarget.copy(_autoLook);
  const diff = new THREE.Vector3().subVectors(camera.position, orbitTarget);
  orbitRadius = Math.max(0.5, diff.length());
  orbitPhi    = Math.acos(Math.max(-1, Math.min(1, diff.y / orbitRadius)));
  orbitTheta  = Math.atan2(diff.x, diff.z);
}

function updateAutoCamera(driving) {
  const fwd = tipDir.clone().normalize();
  let right = new THREE.Vector3().crossVectors(fwd, Y_AXIS);
  if (right.lengthSq() < 0.001) right.set(1, 0, 0);
  right.normalize();
  const localUp = new THREE.Vector3().crossVectors(right, fwd).normalize();

  const idealPos   = tipPos.clone().addScaledVector(fwd, -CAM_BACK).addScaledVector(localUp, CAM_UP);
  const lookTarget = tipPos.clone().addScaledVector(fwd, LOOK_AHEAD);

  // While driving: snap tightly (car-game lock-on); at rest: gentle drift
  const t = driving ? CAM_LERP_DRIVE : CAM_LERP;
  _autoPos.lerp(idealPos,   t);
  _autoLook.lerp(lookTarget, t * 1.4);

  camera.position.copy(_autoPos);
  camera.lookAt(_autoLook);
}

// ── Mouse orbit / pan / zoom ──────────────────────────────
let mouseDown   = false;
let mouseButton = -1;
let lastMX = 0, lastMY = 0;

const elCam = document.getElementById('s-cam');

canvas.addEventListener('mousedown', e => {
  if (e.button === 2) e.preventDefault();
  mouseDown   = true;
  mouseButton = e.button;
  lastMX = e.clientX;
  lastMY = e.clientY;
  if (!manualCamera) {
    // Entering manual mode: seed orbit state from current camera
    syncOrbitFromCamera();
    manualCamera = true;
    elCam.textContent = 'manual camera';
  }
});

canvas.addEventListener('contextmenu', e => e.preventDefault());

window.addEventListener('mousemove', e => {
  if (!mouseDown || !manualCamera) return;
  const dx = e.clientX - lastMX;
  const dy = e.clientY - lastMY;
  lastMX = e.clientX;
  lastMY = e.clientY;

  if (mouseButton === 0) {
    // Left drag → orbit (rotate around target)
    orbitTheta -= dx * 0.005;
    orbitPhi    = Math.max(0.05, Math.min(Math.PI - 0.05, orbitPhi + dy * 0.005));
    applyOrbit();

  } else if (mouseButton === 2) {
    // Right drag → pan (translate camera + target together)
    // Compute camera right and up from current orientation
    const fwd   = new THREE.Vector3().subVectors(orbitTarget, camera.position).normalize();
    const right = new THREE.Vector3().crossVectors(fwd, Y_AXIS).normalize();
    const up    = new THREE.Vector3().crossVectors(right, fwd).normalize();
    const speed = orbitRadius * 0.0012;
    orbitTarget.addScaledVector(right, -dx * speed);
    orbitTarget.addScaledVector(up,     dy * speed);
    applyOrbit();
  }
});

window.addEventListener('mouseup', () => { mouseDown = false; });

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  orbitRadius = Math.max(0.3, Math.min(80, orbitRadius * (e.deltaY > 0 ? 1.08 : 0.92)));
  if (!manualCamera) { syncOrbitFromCamera(); manualCamera = true; elCam.textContent = 'manual camera'; }
  applyOrbit();
}, { passive: false });

// ─────────────────────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  // Don't hijack keys when the user is typing in a text field
  if (e.target.tagName === 'INPUT' && e.target.type === 'text') return;
  keys[e.code] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
  // Any movement key resumes auto-follow
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) {
    manualCamera = false;
    elCam.textContent = 'auto-follow';
  }
  if (e.code === 'KeyR') resetAll();
});
window.addEventListener('keyup', e => {
  if (e.target.tagName === 'INPUT' && e.target.type === 'text') return;
  delete keys[e.code];
});

// ─────────────────────────────────────────────────────────
//  STATUS
// ─────────────────────────────────────────────────────────
const elLen = document.getElementById('s-len');
const elDir = document.getElementById('s-dir');
function updateStatus() {
  elLen.textContent = `trail · ${spinePoints.length}`;
  const yaw   = Math.atan2(tipDir.x, -tipDir.z) * 180 / Math.PI;
  const pitch = Math.asin(Math.max(-1, Math.min(1, tipDir.y))) * 180 / Math.PI;
  elDir.textContent = `yaw ${yaw.toFixed(0)}° · pitch ${pitch.toFixed(0)}°`;
}

// ─────────────────────────────────────────────────────────
//  UI WIRING
// ─────────────────────────────────────────────────────────
function hexToInt(s) { return parseInt(s.slice(1), 16); }
function hexToVec3(s) {
  const h = parseInt(s.slice(1), 16);
  return new THREE.Vector3(((h>>16)&0xff)/255, ((h>>8)&0xff)/255, (h&0xff)/255);
}

document.getElementById('slIntensity') .addEventListener('input', e => { S.lightIntensity = +e.target.value; updateLight(); });
document.getElementById('slAzimuth')   .addEventListener('input', e => { S.lightAzimuth   = +e.target.value; updateLight(); });
document.getElementById('slElevation') .addEventListener('input', e => { S.lightElevation  = +e.target.value; updateLight(); });
document.getElementById('cpLight')     .addEventListener('input', e => { S.lightColor = hexToInt(e.target.value); updateLight(); });
document.getElementById('slShadowInt') .addEventListener('input', e => {
  S.shadowIntensity = +e.target.value;
  // High = dark shadows (less fill); Low = light shadows (more fill)
  shadowFill.intensity = (1 - S.shadowIntensity) * 0.5;
});
document.getElementById('cpShadow')    .addEventListener('input', e => {
  S.shadowColor = hexToInt(e.target.value);
  compositeMat.uniforms.uShadowColor.value.copy(hexToVec3(e.target.value));
});
document.getElementById('cpVine')     .addEventListener('input', e => {
  vineMat.color.setHex(hexToInt(e.target.value));
});
document.getElementById('cpThorn')    .addEventListener('input', e => { thornMat.color.setHex(hexToInt(e.target.value)); });
document.getElementById('cpBg')       .addEventListener('input', e => {
  const v = e.target.value;
  renderer.setClearColor(hexToInt(v), 1);
  compositeMat.uniforms.uBgColor.value.copy(hexToVec3(v));
});
document.getElementById('slSpeed').addEventListener('input', e => { S.growthSpeed = +e.target.value; });

document.getElementById('slVineThick').addEventListener('input', e => {
  S.vineThickness = +e.target.value; rebuildBraid();
});
document.getElementById('slThornQty').addEventListener('input', e => {
  S.thornDensity = +e.target.value; rebuildBraid();
});
document.getElementById('slThornSize').addEventListener('input', e => {
  S.thornSize = +e.target.value; rebuildBraid();
});
document.getElementById('slThornWidth').addEventListener('input', e => {
  S.thornWidth = +e.target.value; rebuildBraid();
});

document.getElementById('slExposure').addEventListener('input', e => {
  S.exposure = +e.target.value;
  compositeMat.uniforms.uExposure.value = S.exposure;
});

document.getElementById('slThreshold').addEventListener('input', e => {
  S.threshold = +e.target.value;
  compositeMat.uniforms.uThreshold.value = S.threshold;
});

document.getElementById('slGrain').addEventListener('input', e => {
  S.grainAmount = +e.target.value;
  compositeMat.uniforms.uAmount.value = S.grainAmount;
});

document.getElementById('btnReset').addEventListener('click', () => resetAll());

// ── Material presets ──────────────────────────────────────
const MATERIALS = {
  matte:  { metalness: 0.00, roughness: 0.95 },
  glossy: { metalness: 0.10, roughness: 0.18 },
  chrome: { metalness: 1.00, roughness: 0.04 },
};
function applyMaterial(preset) {
  const m = MATERIALS[preset];
  vineMat.metalness  = thornMat.metalness  = m.metalness;
  vineMat.roughness  = thornMat.roughness  = m.roughness;
  document.querySelectorAll('.mat-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn' + preset.charAt(0).toUpperCase() + preset.slice(1)).classList.add('active');
}
document.getElementById('btnMatte') .addEventListener('click', () => applyMaterial('matte'));
document.getElementById('btnGlossy').addEventListener('click', () => applyMaterial('glossy'));
document.getElementById('btnChrome').addEventListener('click', () => applyMaterial('chrome'));

// ── Presets (localStorage) ────────────────────────────────
const PRESET_KEY = 'vines_presets_v1';

function intToHex(n) { return '#' + ('000000' + n.toString(16)).slice(-6); }

function collectState() {
  return {
    lightIntensity: S.lightIntensity, lightAzimuth: S.lightAzimuth,
    lightElevation: S.lightElevation, lightColor: S.lightColor,
    shadowIntensity: S.shadowIntensity, shadowColor: S.shadowColor,
    growthSpeed: S.growthSpeed,
    vineColor: S.vineColor, thornColor: S.thornColor, bgColor: S.bgColor,
    vineThickness: S.vineThickness,
    thornDensity: S.thornDensity, thornSize: S.thornSize, thornWidth: S.thornWidth,
    exposure: S.exposure, threshold: S.threshold, grainAmount: S.grainAmount,
    matMetalness: vineMat.metalness, matRoughness: vineMat.roughness,
  };
}

function applyState(p) {
  // State
  Object.assign(S, {
    lightIntensity: p.lightIntensity, lightAzimuth: p.lightAzimuth,
    lightElevation: p.lightElevation, lightColor: p.lightColor,
    shadowIntensity: p.shadowIntensity, shadowColor: p.shadowColor,
    growthSpeed: p.growthSpeed,
    vineColor: p.vineColor, thornColor: p.thornColor, bgColor: p.bgColor,
    vineThickness: p.vineThickness,
    thornDensity: p.thornDensity, thornSize: p.thornSize, thornWidth: p.thornWidth,
    exposure: p.exposure, threshold: p.threshold, grainAmount: p.grainAmount,
  });
  // Three.js objects
  updateLight();
  vineMat.color.setHex(S.vineColor);
  thornMat.color.setHex(S.thornColor);
  vineMat.metalness = thornMat.metalness = p.matMetalness;
  vineMat.roughness = thornMat.roughness = p.matRoughness;
  renderer.setClearColor(S.bgColor, 1);
  shadowFill.intensity = (1 - S.shadowIntensity) * 0.5;
  compositeMat.uniforms.uBgColor.value.copy(hexToVec3(intToHex(S.bgColor)));
  compositeMat.uniforms.uShadowColor.value.copy(hexToVec3(intToHex(S.shadowColor)));
  compositeMat.uniforms.uExposure.value  = S.exposure;
  compositeMat.uniforms.uThreshold.value = S.threshold;
  compositeMat.uniforms.uAmount.value    = S.grainAmount;
  // Sync UI elements
  document.getElementById('slIntensity') .value = S.lightIntensity;
  document.getElementById('slAzimuth')   .value = S.lightAzimuth;
  document.getElementById('slElevation') .value = S.lightElevation;
  document.getElementById('cpLight')     .value = intToHex(S.lightColor);
  document.getElementById('slShadowInt') .value = S.shadowIntensity;
  document.getElementById('cpShadow')    .value = intToHex(S.shadowColor);
  document.getElementById('slSpeed')     .value = S.growthSpeed;
  document.getElementById('cpVine')      .value = intToHex(S.vineColor);
  document.getElementById('cpThorn')     .value = intToHex(S.thornColor);
  document.getElementById('cpBg')        .value = intToHex(S.bgColor);
  document.getElementById('slVineThick') .value = S.vineThickness;
  document.getElementById('slThornQty')  .value = S.thornDensity;
  document.getElementById('slThornSize') .value = S.thornSize;
  document.getElementById('slThornWidth').value = S.thornWidth;
  document.getElementById('slExposure')  .value = S.exposure;
  document.getElementById('slThreshold') .value = S.threshold;
  document.getElementById('slGrain')     .value = S.grainAmount;
  rebuildBraid();
}

function loadAllPresets() { try { return JSON.parse(localStorage.getItem(PRESET_KEY)) || {}; } catch { return {}; } }
function saveAllPresets(obj) { localStorage.setItem(PRESET_KEY, JSON.stringify(obj)); }

function refreshPresetSelect() {
  const sel = document.getElementById('selPreset');
  const cur = sel.value;
  const names = Object.keys(loadAllPresets()).sort();
  sel.innerHTML = '<option value="">— load preset —</option>' +
    names.map(n => `<option value="${n}"${n === cur ? ' selected' : ''}>${n}</option>`).join('');
}

function doSavePreset() {
  const name = document.getElementById('presetName').value.trim();
  if (!name) return;
  const all = loadAllPresets();
  all[name] = collectState();
  saveAllPresets(all);
  refreshPresetSelect();
  document.getElementById('selPreset').value = name;
}
document.getElementById('btnSavePreset').addEventListener('click', doSavePreset);
document.getElementById('presetName')   .addEventListener('keydown', e => {
  if (e.code === 'Enter') { e.preventDefault(); doSavePreset(); }
});

document.getElementById('selPreset').addEventListener('change', e => {
  if (!e.target.value) return;
  const all = loadAllPresets();
  if (all[e.target.value]) applyState(all[e.target.value]);
});

document.getElementById('btnDelPreset').addEventListener('click', () => {
  const sel = document.getElementById('selPreset');
  if (!sel.value) return;
  const all = loadAllPresets();
  delete all[sel.value];
  saveAllPresets(all);
  refreshPresetSelect();
});

refreshPresetSelect();

// ── Accordion ─────────────────────────────────────────────
document.querySelectorAll('.acc-header').forEach(header => {
  header.addEventListener('click', () => {
    const id   = header.dataset.acc;
    const body = document.getElementById('acc-' + id);
    const isOpen = header.classList.contains('open');
    header.classList.toggle('open', !isOpen);
    body.classList.toggle('open', !isOpen);
  });
});

// ─────────────────────────────────────────────────────────
//  EXPORT
// ─────────────────────────────────────────────────────────
function renderFrame() {
  compositeMat.uniforms.uTime.value = clock.getElapsedTime();
  renderer.setRenderTarget(renderTarget);
  renderer.render(scene, camera);
  renderer.setRenderTarget(null);
  renderer.render(compositeScene, compositeCamera);
}

document.getElementById('btnJPG').addEventListener('click', () => {
  const sel = document.getElementById('selExport').value;

  if (sel === 'screen') {
    // Capture at current display resolution
    renderFrame();
    const a = document.createElement('a');
    a.href = renderer.domElement.toDataURL('image/jpeg', 0.95);
    a.download = `vines_${Date.now()}.jpg`;
    a.click();
    return;
  }

  // Capture at chosen resolution
  const [expW, expH] = sel.split('x').map(Number);
  const screenW = window.innerWidth,  screenH = window.innerHeight;
  const prevDpr  = renderer.getPixelRatio();
  const prevAspect = camera.aspect;

  // Switch to export resolution (updateStyle=false keeps CSS untouched)
  renderer.setPixelRatio(1);
  renderer.setSize(expW, expH, false);
  renderTarget.setSize(expW, expH);
  camera.aspect = expW / expH;
  camera.updateProjectionMatrix();

  renderFrame();

  const a = document.createElement('a');
  a.href = renderer.domElement.toDataURL('image/jpeg', 0.95);
  a.download = `vines_${expW}x${expH}_${Date.now()}.jpg`;
  a.click();

  // Restore
  renderer.setPixelRatio(prevDpr);
  renderer.setSize(screenW, screenH, false);
  renderTarget.setSize(screenW, screenH);
  camera.aspect = prevAspect;
  camera.updateProjectionMatrix();
});

// ─────────────────────────────────────────────────────────
//  ANIMATION LOOP
// ─────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const moving = keys['ArrowLeft'] || keys['ArrowRight'] ||
                 keys['ArrowUp']   || keys['ArrowDown']  ||
                 keys['Space'];

  if (moving) {
    if (keys['ArrowLeft'] || keys['ArrowRight']) {
      const sign = keys['ArrowLeft'] ? 1 : -1;
      tipDir.applyQuaternion(
        new THREE.Quaternion().setFromAxisAngle(Y_AXIS, sign * STEER_RATE)
      ).normalize();
    }
    if (keys['ArrowUp'] || keys['ArrowDown']) {
      let right = new THREE.Vector3().crossVectors(tipDir, Y_AXIS);
      if (right.lengthSq() < 0.001) right.set(1, 0, 0);
      right.normalize();
      const sign = keys['ArrowUp'] ? 1 : -1;
      tipDir.applyQuaternion(
        new THREE.Quaternion().setFromAxisAngle(right, sign * STEER_RATE)
      ).normalize();
    }
    if (keys['Space']) {
      const flat = new THREE.Vector3(tipDir.x, 0, tipDir.z);
      if (flat.lengthSq() > 0.01) tipDir.lerp(flat.normalize(), 0.06).normalize();
    }
    tipPos.addScaledVector(tipDir, S.growthSpeed);
    distAccum += S.growthSpeed;
    if (distAccum >= SEGMENT_LEN) {
      distAccum = 0;
      confirmPoint(tipPos);
      updateStatus();
    }
  }

  // Camera: auto-follow unless mouse has taken over
  if (!manualCamera) updateAutoCamera(moving);

  compositeMat.uniforms.uTime.value = clock.getElapsedTime();

  renderer.setRenderTarget(renderTarget);
  renderer.render(scene, camera);
  renderer.setRenderTarget(null);
  renderer.render(compositeScene, compositeCamera);

}

// ─────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────
for (let i = 0; i < 8; i++) {
  tipPos.addScaledVector(tipDir, SEGMENT_LEN);
  spinePoints.push(tipPos.clone());
}
rebuildBraid();
animate();
